name: System Pro Cloud Bridge

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Workspace Cleanup
        uses: actions/checkout@v4

      - name: 2. Java Development Kit Setup (v17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Injecting Code from System Pro App
        run: |
          # پیکیج کا راستہ خودکار طور پر بنانا
          PKG_NAME="${{ github.event.client_payload.package_name }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # ایپ سے بھیجا گیا کوڈ کلاؤڈ فائلوں میں منتقل کرنا
          echo '${{ github.event.client_payload.java }}' > app/src/main/java/$PKG_PATH/MainActivity.java
          echo '${{ github.event.client_payload.xml }}' > app/src/main/res/layout/activity_main.xml
          echo '${{ github.event.client_payload.manifest }}' > app/src/main/AndroidManifest.xml
          
          # ضروری ریسورسز (Colors and Styles)
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#00FFCC</color><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" /></resources>' > app/src/main/res/values/colors.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">${{ github.event.client_payload.app_name }}</string></resources>' > app/src/main/res/values/strings.xml

      - name: 4. Auto-Configure Build Engine
        run: |
          # گریڈل فائلز کی تیاری
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "${{ github.event.client_payload.package_name }}"
              compileSdk 34
              defaultConfig {
                  applicationId "${{ github.event.client_payload.package_name }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 5. Compiling & Generating APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: 6. Delivery of APK to Local Bridge
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}_Production
          path: app/build/outputs/apk/debug/*.apk
